<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test HTML Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 20px;
    }
    .container {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
    }
    .button {
      display: inline-block;
      padding: 10px 15px;
      background: #0078d7;
      color: #fff;
      border-radius: 4px;
      text-decoration: none;
    }
    .button:hover {
      background: #005a9e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, World!</h1>
    <p>This is a test HTML page with basic styling.</p>
    <a href="#" class="button">Click Me</a>
  </div>
</body>
</html>
